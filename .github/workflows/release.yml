name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.5.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: broski
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: broski
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p broski-cli --target ${{ matrix.target }}

      - name: Package artifact (Linux/macOS)
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          mkdir -p dist
          bro_bin="target/${TARGET}/release/broski"
          bro_asset="broski-${RELEASE_TAG}-${TARGET}.${ARCHIVE_EXT}"
          tar -C "$(dirname "$bro_bin")" -czf "dist/${bro_asset}" "$(basename "$bro_bin")"
          echo "created dist/${bro_asset}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum broski-* > SHA256SUMS.txt

      - name: Delete any existing release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          existing=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))" || true)
          if [ -n "${existing}" ]; then
            echo "Deleting existing release id=${existing} for ${RELEASE_TAG}"
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${existing}"
          else
            echo "No existing release for ${RELEASE_TAG}"
          fi

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          awk -v v="$version" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section) { exit }
              if ($0 ~ "\\[" v "\\]") { in_section = 1; print; next }
            }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "release ${RELEASE_TAG}" > release-notes.md
            echo "" >> release-notes.md
            echo "_No CHANGELOG entry found for ${version}; see commit history for details._" >> release-notes.md
          fi
          echo "--- release notes preview ---"
          head -40 release-notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          fail_on_unmatched_files: true
          body_path: release-notes.md
          files: |
            dist/broski-*
            dist/SHA256SUMS.txt
