name: docs-deploy

on:
  push:
    branches: ['main']
    paths:
      - 'website/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build docs
        working-directory: website
        run: npm run build

      - name: Check Vercel secret availability
        id: vercel_secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: ${{ steps.vercel_secrets.outputs.ready == 'true' }}
        run: npm i -g vercel@latest

      - name: Pull Vercel project settings
        if: ${{ steps.vercel_secrets.outputs.ready == 'true' }}
        working-directory: website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        if: ${{ steps.vercel_secrets.outputs.ready == 'true' }}
        working-directory: website
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Skip deploy when secrets missing
        if: ${{ steps.vercel_secrets.outputs.ready != 'true' }}
        run: echo "Vercel secrets not configured; docs build validated but deploy skipped."
